<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091225"/>
      <stop offset="1" stop-color="#111B38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#202A50"/>
      <stop offset="1" stop-color="#182242"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7AA2FF"/>
      <stop offset="1" stop-color="#7F6CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#AFC4FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #B9C7EA; }
      .section { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #D8E1FF; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #BDD0FF; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #EAF0FF; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1450" cy="120" r="180" fill="#1B2D62" opacity="0.22"/>
  <circle cx="180" cy="820" r="220" fill="#213A7A" opacity="0.18"/>
  <circle cx="790" cy="90" r="120" fill="#3A4FC8" opacity="0.10"/>

  <text x="90" y="82" class="title">GNDEC Chatbot Project Architecture</text>
  <text x="90" y="116" class="subtitle">Flask app + parser + resolver + Gemini-grounded response generation + admin request workflow</text>

  <rect x="82" y="170" width="280" height="150" rx="24" fill="url(#panel)" stroke="#3E4F88" filter="url(#shadow)"/>
  <rect x="104" y="192" width="92" height="30" rx="15" fill="url(#accent)"/>
  <text x="126" y="212" class="chip">Frontend</text>
  <text x="110" y="252" class="label">Student / Admin UI</text>
  <text x="110" y="282" class="body">`templates/index.html`</text>
  <text x="110" y="305" class="body">`templates/admin_panel.html`</text>

  <rect x="468" y="154" width="676" height="212" rx="28" fill="rgba(23,33,67,0.78)" stroke="#40528F"/>
  <text x="500" y="200" class="section">Flask Application Layer</text>

  <rect x="500" y="224" width="194" height="106" rx="18" fill="url(#panel)" stroke="#455893" filter="url(#shadow)"/>
  <text x="524" y="255" class="label">Routes</text>
  <text x="524" y="282" class="body">`/`</text>
  <text x="524" y="304" class="body">`/admin-panel`</text>

  <rect x="708" y="224" width="204" height="106" rx="18" fill="url(#panel)" stroke="#455893" filter="url(#shadow)"/>
  <text x="732" y="255" class="label">Chat APIs</text>
  <text x="732" y="282" class="body">`/chat`</text>
  <text x="732" y="304" class="body">`/request-support`</text>

  <rect x="926" y="224" width="184" height="106" rx="18" fill="url(#panel)" stroke="#455893" filter="url(#shadow)"/>
  <text x="950" y="255" class="label">Admin APIs</text>
  <text x="950" y="282" class="body">`/admin/requests`</text>
  <text x="950" y="304" class="body">`/admin/requests/update`</text>

  <rect x="1238" y="170" width="282" height="150" rx="24" fill="url(#panel)" stroke="#3E4F88" filter="url(#shadow)"/>
  <rect x="1260" y="192" width="92" height="30" rx="15" fill="url(#accent)"/>
  <text x="1283" y="212" class="chip">Core File</text>
  <text x="1268" y="252" class="label">`app.py`</text>
  <text x="1268" y="282" class="body">Request entrypoint</text>
  <text x="1268" y="305" class="body">CORS + JSON responses</text>

  <rect x="122" y="440" width="370" height="218" rx="26" fill="url(#panel)" stroke="#40528F" filter="url(#shadow)"/>
  <text x="150" y="482" class="section">Query Understanding</text>
  <text x="150" y="520" class="label">`chatbot/parser.py`</text>
  <text x="150" y="551" class="body">- language detection</text>
  <text x="150" y="576" class="body">- intent detection</text>
  <text x="150" y="601" class="body">- department / group / section extraction</text>
  <text x="150" y="626" class="body">- teacher name filtering</text>

  <rect x="548" y="420" width="484" height="258" rx="26" fill="url(#panel)" stroke="#40528F" filter="url(#shadow)"/>
  <text x="578" y="462" class="section">Retrieval and Resolution</text>
  <text x="578" y="500" class="label">`scraper/resolver.py`</text>
  <text x="578" y="531" class="body">- classify query type</text>
  <text x="578" y="556" class="body">- select official GNDEC source / PDF / timetable HTML</text>
  <text x="578" y="581" class="body">- scrape and clean official context</text>
  <text x="578" y="606" class="body">- exact timetable anchor matching</text>
  <text x="578" y="631" class="body">- facility, SRE, hostel, fee, exam routing</text>

  <rect x="1092" y="420" width="386" height="258" rx="26" fill="url(#panel)" stroke="#40528F" filter="url(#shadow)"/>
  <text x="1122" y="462" class="section">Response Generation</text>
  <text x="1122" y="500" class="label">`chatbot/response_engine.py`</text>
  <text x="1122" y="531" class="body">- greeting / thanks / goodbye shortcuts</text>
  <text x="1122" y="556" class="body">- Gemini call with grounded context</text>
  <text x="1122" y="581" class="body">- local fallback answer builder</text>
  <text x="1122" y="606" class="body">- response meta: URL / PDF / auto-open</text>

  <rect x="126" y="744" width="418" height="166" rx="26" fill="url(#panel)" stroke="#40528F" filter="url(#shadow)"/>
  <text x="156" y="786" class="section">Knowledge Inputs</text>
  <text x="156" y="821" class="body">`intents.json`</text>
  <text x="156" y="846" class="body">`data/gndec_intent_dataset.json`</text>
  <text x="156" y="871" class="body">`config.py` with official GNDEC links</text>

  <rect x="604" y="744" width="418" height="166" rx="26" fill="url(#panel)" stroke="#40528F" filter="url(#shadow)"/>
  <text x="634" y="786" class="section">External Sources</text>
  <text x="634" y="821" class="body">GNDEC main site, departments, admission portal</text>
  <text x="634" y="846" class="body">exam portal, hostel PDFs, calendar PDFs</text>
  <text x="634" y="871" class="body">live HTML timetable pages</text>

  <rect x="1084" y="744" width="398" height="166" rx="26" fill="url(#panel)" stroke="#40528F" filter="url(#shadow)"/>
  <text x="1114" y="786" class="section">Admin Workflow</text>
  <text x="1114" y="821" class="body">`chatbot/request_engine.py`</text>
  <text x="1114" y="846" class="body">submit request, history, status update</text>
  <text x="1114" y="871" class="body">admin review + request tracking</text>

  <line x1="362" y1="245" x2="500" y2="245" stroke="#AFC4FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1144" y1="245" x2="1238" y2="245" stroke="#AFC4FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="330" x2="810" y2="420" stroke="#AFC4FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="307" y1="320" x2="307" y2="440" stroke="#AFC4FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="492" y1="548" x2="548" y2="548" stroke="#AFC4FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1032" y1="548" x2="1092" y2="548" stroke="#AFC4FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="335" y1="744" x2="335" y2="660" stroke="#89A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="813" y1="744" x2="813" y2="678" stroke="#89A7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1285" y1="744" x2="1285" y2="678" stroke="#89A7FF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="544" y="160" width="164" height="34" rx="17" fill="#101B3B" stroke="#4D63A7"/>
  <text x="569" y="182" class="small">Python + Flask backend</text>

  <rect x="734" y="696" width="248" height="30" rx="15" fill="url(#accent)" opacity="0.92"/>
  <text x="765" y="716" class="chip">Live retrieval, not vector DB RAG</text>

  <rect x="1086" y="696" width="262" height="30" rx="15" fill="url(#accent)" opacity="0.92"/>
  <text x="1118" y="716" class="chip">Gemini-grounded answer pipeline</text>
</svg>
