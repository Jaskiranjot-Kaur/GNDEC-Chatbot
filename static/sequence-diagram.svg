<svg width="1700" height="980" viewBox="0 0 1700 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081220"/>
      <stop offset="1" stop-color="#111D38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1F2B4F"/>
      <stop offset="1" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#70A8FF"/>
      <stop offset="1" stop-color="#7C6FFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1L7 4.5L1 8" stroke="#B3C8FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #C6D2F3; }
      .label { font: 700 25px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #E0E8FF; }
      .small { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1700" height="980" fill="url(#bg)"/>
  <circle cx="1490" cy="120" r="170" fill="#213A7B" opacity="0.14"/>
  <circle cx="180" cy="840" r="190" fill="#1C3270" opacity="0.13"/>

  <text x="86" y="88" class="title">Sequence Diagram</text>
  <text x="86" y="124" class="subtitle">Short and clear report version</text>

  <rect x="90" y="170" width="240" height="70" rx="20" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="163" y="214" class="label">User</text>

  <rect x="420" y="170" width="240" height="70" rx="20" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="472" y="214" class="label">Frontend</text>

  <rect x="750" y="170" width="240" height="70" rx="20" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="818" y="214" class="label">Backend</text>

  <rect x="1080" y="170" width="240" height="70" rx="20" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1113" y="214" class="label">Resolver</text>

  <rect x="1410" y="170" width="240" height="70" rx="20" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1472" y="214" class="label">Gemini</text>

  <line x1="210" y1="240" x2="210" y2="860" stroke="#6E83BA" stroke-width="3" stroke-dasharray="10 10"/>
  <line x1="540" y1="240" x2="540" y2="860" stroke="#6E83BA" stroke-width="3" stroke-dasharray="10 10"/>
  <line x1="870" y1="240" x2="870" y2="860" stroke="#6E83BA" stroke-width="3" stroke-dasharray="10 10"/>
  <line x1="1200" y1="240" x2="1200" y2="860" stroke="#6E83BA" stroke-width="3" stroke-dasharray="10 10"/>
  <line x1="1530" y1="240" x2="1530" y2="860" stroke="#6E83BA" stroke-width="3" stroke-dasharray="10 10"/>

  <line x1="220" y1="320" x2="530" y2="320" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="282" y="300" class="small">Enter query</text>

  <line x1="550" y1="400" x2="860" y2="400" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="598" y="380" class="small">Send request</text>

  <line x1="880" y1="480" x2="1190" y2="480" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="926" y="460" class="small">Resolve source</text>

  <line x1="1190" y1="560" x2="880" y2="560" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="952" y="590" class="small">Context</text>

  <line x1="880" y1="640" x2="1520" y2="640" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1074" y="620" class="small">Generate reply</text>

  <line x1="1520" y1="720" x2="880" y2="720" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1118" y="750" class="small">Answer</text>

  <line x1="860" y1="800" x2="550" y2="800" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="624" y="830" class="small">Response</text>

  <line x1="530" y1="860" x2="220" y2="860" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="276" y="890" class="small">Show output</text>
</svg>
