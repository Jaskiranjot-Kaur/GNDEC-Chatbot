<svg width="1700" height="980" viewBox="0 0 1700 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081220"/>
      <stop offset="1" stop-color="#111D38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1F2B4F"/>
      <stop offset="1" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#70A8FF"/>
      <stop offset="1" stop-color="#7C6FFF"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#49D0C5"/>
      <stop offset="1" stop-color="#269C9C"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6C453"/>
      <stop offset="1" stop-color="#F38B49"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1L7 4.5L1 8" stroke="#B3C8FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #C6D2F3; }
      .section { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #E0E8FF; }
      .chip { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1700" height="980" fill="url(#bg)"/>
  <circle cx="1480" cy="120" r="180" fill="#213A7B" opacity="0.16"/>
  <circle cx="180" cy="850" r="220" fill="#1C3270" opacity="0.15"/>

  <text x="86" y="88" class="title">GNDEC Chatbot Module Interaction Diagram</text>
  <text x="86" y="124" class="subtitle">How major files and modules interact inside the project</text>

  <rect x="82" y="174" width="1536" height="736" rx="30" fill="rgba(19,29,57,0.82)" stroke="#40528F"/>

  <rect x="120" y="230" width="250" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <rect x="146" y="254" width="96" height="34" rx="17" fill="url(#accent1)"/>
  <text x="173" y="277" class="chip">UI</text>
  <text x="148" y="316" class="label">Frontend Pages</text>
  <text x="148" y="344" class="body">User chat + admin panel</text>

  <rect x="450" y="230" width="250" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <rect x="476" y="254" width="96" height="34" rx="17" fill="url(#accent2)"/>
  <text x="500" y="277" class="chip">Core</text>
  <text x="478" y="316" class="label">app.py</text>
  <text x="478" y="344" class="body">Routes and request handling</text>

  <rect x="780" y="230" width="250" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <rect x="806" y="254" width="96" height="34" rx="17" fill="url(#accent3)"/>
  <text x="831" y="277" class="chip">Input</text>
  <text x="808" y="316" class="label">parser.py</text>
  <text x="808" y="344" class="body">Intent and entity extraction</text>

  <rect x="1110" y="230" width="250" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <rect x="1136" y="254" width="96" height="34" rx="17" fill="url(#accent1)"/>
  <text x="1162" y="277" class="chip">Source</text>
  <text x="1138" y="316" class="label">resolver.py</text>
  <text x="1138" y="344" class="body">Official link and context selection</text>

  <rect x="440" y="482" width="270" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="468" y="528" class="section">response_engine.py</text>
  <text x="468" y="560" class="body">Build reply with Gemini or fallback</text>

  <rect x="790" y="482" width="270" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="818" y="528" class="section">request_engine.py</text>
  <text x="818" y="560" class="body">Admin support request workflow</text>

  <rect x="1140" y="482" width="300" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1168" y="528" class="section">translator.py</text>
  <text x="1168" y="560" class="body">Normalize multilingual user text</text>

  <rect x="180" y="710" width="280" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="208" y="756" class="section">config.py</text>
  <text x="208" y="788" class="body">GNDEC links and department mapping</text>

  <rect x="540" y="710" width="280" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="568" y="756" class="section">intents.json</text>
  <text x="568" y="788" class="body">Legacy intent patterns and responses</text>

  <rect x="900" y="710" width="320" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="928" y="756" class="section">gndec_intent_dataset.json</text>
  <text x="928" y="788" class="body">Curated GNDEC intent dataset</text>

  <rect x="1300" y="710" width="250" height="130" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1328" y="756" class="section">GNDEC Sources</text>
  <text x="1328" y="788" class="body">Web pages, PDFs, timetables</text>

  <line x1="370" y1="295" x2="442" y2="295" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="700" y1="295" x2="772" y2="295" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1030" y1="295" x2="1102" y2="295" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <line x1="575" y1="360" x2="575" y2="474" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="905" y1="360" x2="905" y2="474" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1235" y1="360" x2="1235" y2="474" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <line x1="710" y1="547" x2="782" y2="547" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1030" y1="547" x2="1132" y2="547" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M320 710V640H1110V555" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)"/>

  <path d="M680 710V640H905V620" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)"/>

  <path d="M1060 710V652H920" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <path d="M1425 710V640H1235V620" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)"/>
</svg>
