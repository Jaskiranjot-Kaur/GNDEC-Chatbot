<svg width="1700" height="980" viewBox="0 0 1700 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081220"/>
      <stop offset="1" stop-color="#111D38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1F2B4F"/>
      <stop offset="1" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#70A8FF"/>
      <stop offset="1" stop-color="#7C6FFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1L7 4.5L1 8" stroke="#B3C8FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #C6D2F3; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #E0E8FF; }
      .small { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1700" height="980" fill="url(#bg)"/>
  <circle cx="1490" cy="120" r="170" fill="#213A7B" opacity="0.14"/>
  <circle cx="180" cy="840" r="190" fill="#1C3270" opacity="0.13"/>

  <text x="86" y="88" class="title">DFD Level 1</text>
  <text x="86" y="124" class="subtitle">Detailed data flow inside the chatbot system</text>

  <rect x="110" y="280" width="220" height="120" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="176" y="346" class="label">Student</text>

  <rect x="1370" y="280" width="220" height="120" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1445" y="346" class="label">Admin</text>

  <rect x="410" y="180" width="240" height="110" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="450" y="240" class="label">1.0 Query Input</text>

  <rect x="730" y="180" width="240" height="110" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="746" y="240" class="label">2.0 Query Processing</text>

  <rect x="1050" y="180" width="240" height="110" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1072" y="240" class="label">3.0 Response Output</text>

  <rect x="410" y="520" width="240" height="110" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="424" y="580" class="label">4.0 Support Request</text>

  <rect x="730" y="520" width="240" height="110" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="756" y="580" class="label">5.0 Status Tracking</text>

  <rect x="1050" y="520" width="240" height="110" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="1072" y="580" class="label">6.0 Admin Update</text>

  <rect x="650" y="760" width="230" height="100" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="694" y="816" class="label">D1 Intent Data</text>

  <rect x="940" y="760" width="260" height="100" rx="24" fill="url(#panel)" stroke="#465994" filter="url(#shadow)"/>
  <text x="972" y="816" class="label">D2 Official Sources</text>

  <line x1="330" y1="330" x2="410" y2="235" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="292" y="242" class="small">query</text>

  <line x1="650" y1="235" x2="730" y2="235" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="640" y="214" class="small">input text</text>

  <line x1="970" y1="235" x2="1050" y2="235" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="962" y="214" class="small">reply data</text>

  <line x1="1290" y1="250" x2="1370" y2="330" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1274" y="270" class="small">status / result</text>

  <line x1="330" y1="360" x2="410" y2="560" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="258" y="470" class="small">support request</text>

  <line x1="650" y1="575" x2="730" y2="575" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="634" y="552" class="small">request id</text>

  <line x1="970" y1="575" x2="1050" y2="575" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="944" y="552" class="small">pending request</text>

  <line x1="1290" y1="575" x2="1370" y2="350" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1280" y="466" class="small">review / update</text>

  <line x1="760" y1="760" x2="760" y2="290" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="784" y="536" class="small">intent patterns</text>

  <line x1="1070" y1="760" x2="1070" y2="290" stroke="#B3C8FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1094" y="536" class="small">official data</text>
</svg>
