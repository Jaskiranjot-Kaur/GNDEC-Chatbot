<svg width="1700" height="920" viewBox="0 0 1700 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081220"/>
      <stop offset="1" stop-color="#111D38"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#70A8FF"/>
      <stop offset="1" stop-color="#7C6FFF"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#49D0C5"/>
      <stop offset="1" stop-color="#269C9C"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6C453"/>
      <stop offset="1" stop-color="#F38B49"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F472B6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #C6D2F3; }
      .label { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 24px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1700" height="920" fill="url(#bg)"/>
  <circle cx="1490" cy="120" r="170" fill="#213A7B" opacity="0.14"/>
  <circle cx="180" cy="780" r="190" fill="#1C3270" opacity="0.13"/>

  <text x="86" y="88" class="title">Layered Architecture of the System</text>
  <text x="86" y="124" class="subtitle">Short and clear report version</text>

  <rect x="300" y="180" width="1100" height="120" rx="28" fill="url(#layer1)" filter="url(#shadow)"/>
  <text x="652" y="232" class="label">Presentation Layer</text>
  <text x="517" y="272" class="body">User Interface, Admin Panel, Web Pages</text>

  <rect x="260" y="330" width="1180" height="120" rx="28" fill="url(#layer2)" filter="url(#shadow)"/>
  <text x="624" y="382" class="label">Application Layer</text>
  <text x="446" y="422" class="body">Flask Routes, Request Handling, Response Flow</text>

  <rect x="220" y="480" width="1260" height="120" rx="28" fill="url(#layer3)" filter="url(#shadow)"/>
  <text x="621" y="532" class="label">Business Logic Layer</text>
  <text x="330" y="572" class="body">Parser, Resolver, Response Engine, Request Engine, Translator</text>

  <rect x="180" y="630" width="1340" height="120" rx="28" fill="url(#layer4)" filter="url(#shadow)"/>
  <text x="630" y="682" class="label">Data / Resource Layer</text>
  <text x="228" y="722" class="body">Intents JSON, Config, GNDEC Websites, PDFs, Timetable Pages, Gemini API</text>
</svg>
