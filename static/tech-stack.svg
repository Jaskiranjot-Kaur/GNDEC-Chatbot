<svg width="1700" height="980" viewBox="0 0 1700 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081220"/>
      <stop offset="1" stop-color="#101C36"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E2B50"/>
      <stop offset="1" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="chipA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#70A7FF"/>
      <stop offset="1" stop-color="#7C6FFF"/>
    </linearGradient>
    <linearGradient id="chipB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#49D0C5"/>
      <stop offset="1" stop-color="#269C9C"/>
    </linearGradient>
    <linearGradient id="chipC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F7C95A"/>
      <stop offset="1" stop-color="#F38B4A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #C6D2F3; }
      .section { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #E0E8FF; }
      .chip { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1700" height="980" fill="url(#bg)"/>
  <circle cx="1470" cy="120" r="190" fill="#213A7B" opacity="0.15"/>
  <circle cx="170" cy="850" r="220" fill="#1C3270" opacity="0.14"/>

  <text x="86" y="86" class="title">GNDEC Chatbot Tech Stack</text>
  <text x="86" y="122" class="subtitle">Clean report version</text>

  <rect x="70" y="158" width="1560" height="752" rx="30" fill="rgba(19,29,57,0.82)" stroke="#40528F"/>

  <rect x="100" y="194" width="470" height="290" rx="28" fill="url(#panel)" stroke="#475A97" filter="url(#shadow)"/>
  <rect x="126" y="218" width="126" height="36" rx="18" fill="url(#chipA)"/>
  <text x="156" y="242" class="chip">Backend</text>
  <text x="126" y="296" class="section">Core Server</text>
  <text x="126" y="344" class="label">Python</text>
  <text x="126" y="380" class="body">Flask</text>
  <text x="126" y="416" class="body">Flask-CORS</text>

  <rect x="614" y="194" width="470" height="290" rx="28" fill="url(#panel)" stroke="#475A97" filter="url(#shadow)"/>
  <rect x="640" y="218" width="132" height="36" rx="18" fill="url(#chipB)"/>
  <text x="671" y="242" class="chip">Frontend</text>
  <text x="640" y="296" class="section">User Interface</text>
  <text x="640" y="344" class="label">HTML</text>
  <text x="640" y="380" class="body">CSS</text>
  <text x="640" y="416" class="body">JavaScript</text>

  <rect x="1128" y="194" width="470" height="290" rx="28" fill="url(#panel)" stroke="#475A97" filter="url(#shadow)"/>
  <rect x="1154" y="218" width="122" height="36" rx="18" fill="url(#chipC)"/>
  <text x="1186" y="242" class="chip">AI Layer</text>
  <text x="1154" y="296" class="section">Language AI</text>
  <text x="1154" y="344" class="label">Google Gemini</text>
  <text x="1154" y="380" class="body">langdetect</text>

  <rect x="100" y="536" width="470" height="290" rx="28" fill="url(#panel)" stroke="#475A97" filter="url(#shadow)"/>
  <text x="126" y="588" class="section">Retrieval Tools</text>
  <text x="126" y="638" class="label">requests</text>
  <text x="126" y="674" class="body">BeautifulSoup4</text>
  <text x="126" y="710" class="body">pdfplumber</text>

  <rect x="614" y="536" width="470" height="290" rx="28" fill="url(#panel)" stroke="#475A97" filter="url(#shadow)"/>
  <text x="640" y="588" class="section">Project Data</text>
  <text x="640" y="638" class="label">intents.json</text>
  <text x="640" y="674" class="body">gndec_intent_dataset.json</text>
  <text x="640" y="710" class="body">config.py</text>

  <rect x="1128" y="536" width="470" height="290" rx="28" fill="url(#panel)" stroke="#475A97" filter="url(#shadow)"/>
  <text x="1154" y="588" class="section">Architecture Style</text>
  <text x="1154" y="638" class="label">Flask Monolith</text>
  <text x="1154" y="674" class="body">Rule-based Parsing</text>
  <text x="1154" y="710" class="body">Live Retrieval + Grounded Response</text>
</svg>
