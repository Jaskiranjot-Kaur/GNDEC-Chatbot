<svg width="1700" height="900" viewBox="0 0 1700 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081220"/>
      <stop offset="1" stop-color="#111D38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1F2B4F"/>
      <stop offset="1" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#70A8FF"/>
      <stop offset="1" stop-color="#7C6FFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #C6D2F3; }
      .head { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #E0E8FF; }
      .small { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1700" height="900" fill="url(#bg)"/>
  <circle cx="1480" cy="120" r="180" fill="#213A7B" opacity="0.14"/>
  <circle cx="180" cy="760" r="190" fill="#1C3270" opacity="0.13"/>

  <text x="86" y="88" class="title">Database ER Diagram</text>
  <text x="86" y="124" class="subtitle">Short and easy report version</text>

  <rect x="220" y="220" width="420" height="360" fill="url(#panel)" stroke="#4B5F9B" filter="url(#shadow)"/>
  <line x1="220" y1="286" x2="640" y2="286" stroke="#5B70AF" stroke-width="2"/>
  <text x="318" y="262" class="head">StudentRequest</text>
  <text x="252" y="328" class="body">PK  request_id</text>
  <text x="252" y="362" class="body">student_name</text>
  <text x="252" y="396" class="body">roll_number</text>
  <text x="252" y="430" class="body">request_type</text>
  <text x="252" y="464" class="body">priority</text>
  <text x="252" y="498" class="body">reason</text>
  <text x="252" y="532" class="body">created_at</text>

  <rect x="980" y="220" width="420" height="360" fill="url(#panel)" stroke="#4B5F9B" filter="url(#shadow)"/>
  <line x1="980" y1="286" x2="1400" y2="286" stroke="#5B70AF" stroke-width="2"/>
  <text x="1098" y="262" class="head">RequestStatus</text>
  <text x="1012" y="328" class="body">PK  request_id</text>
  <text x="1012" y="362" class="body">status</text>
  <text x="1012" y="396" class="body">office</text>
  <text x="1012" y="430" class="body">route</text>
  <text x="1012" y="464" class="body">admin_note</text>
  <text x="1012" y="498" class="body">updated_at</text>
  <text x="1012" y="532" class="body">support_link</text>

  <line x1="640" y1="400" x2="980" y2="400" stroke="#B3C8FF" stroke-width="5" stroke-linecap="round"/>
  <text x="735" y="378" class="small">1 : 1</text>
  <text x="708" y="430" class="small">request_id</text>

  <rect x="580" y="700" width="540" height="90" rx="24" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="640" y="754" class="head">Stored in `data/request_store.json`</text>
</svg>
